<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Inscriptions MediBox Antilles-Guyane · choisis ton parcours : Terminale Santé, PASS-LAS, LAS2-3, P2-D4.">
<title>Inscriptions · MediBox Antilles-Guyane</title>
<link rel="icon" href="logo-medibox.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#01466e; --navy2:#012f4a; --gold:#ffd166; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Chakra Petch',sans-serif;min-height:100vh;
       background:linear-gradient(160deg,var(--navy),var(--navy2));color:#fff;
       display:flex;flex-direction:column;align-items:center;padding:30px 18px 44px;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .brand img{height:44px;width:auto;}
  .brand span{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.2rem;}
  .brand strong{color:var(--gold);}
  .hero{text-align:center;max-width:560px;margin-bottom:26px;}
  .hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.4rem;line-height:1.05;margin-bottom:8px;}
  .hero p{color:rgba(255,255,255,.82);font-size:.95rem;line-height:1.5;}

  /* Grille 2×2 de cadrans carrés */
  .grid{width:100%;max-width:560px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .quad{aspect-ratio:1/1;border-radius:22px;padding:20px 16px;display:flex;flex-direction:column;
        align-items:center;justify-content:center;text-align:center;text-decoration:none;color:#fff;
        position:relative;box-shadow:0 12px 28px rgba(0,0,0,.28);transition:transform .15s,box-shadow .15s;}
  .quad:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 18px 38px rgba(0,0,0,.36);}
  .quad-emo{font-size:2.7rem;line-height:1;margin-bottom:10px;}
  .quad-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.45rem;line-height:1.05;}
  .quad-desc{font-size:.78rem;color:rgba(255,255,255,.9);margin-top:6px;line-height:1.3;}
  .quad-cta{margin-top:12px;font-size:.8rem;font-weight:700;background:rgba(255,255,255,.22);
            padding:5px 14px;border-radius:999px;backdrop-filter:blur(2px);}

  /* Couleurs par cadran */
  .q-terminale{background:linear-gradient(150deg,#f59e0b,#d97706);}
  .q-passlas  {background:linear-gradient(150deg,#10b981,#0d9488);}
  .q-las23    {background:linear-gradient(150deg,#8b5cf6,#6d28d9);}
  .q-p2d4     {background:linear-gradient(150deg,#fb7185,#e11d48);}

  /* Cadran à venir : désaturé + non cliquable + badge */
  .quad.soon{filter:grayscale(.5) brightness(.85);cursor:default;pointer-events:none;}
  .quad.soon .quad-cta{background:var(--gold);color:var(--navy);}

  .foot{margin-top:28px;font-size:.74rem;color:rgba(255,255,255,.5);text-align:center;}

  @media (max-width:380px){
    .quad-title{font-size:1.2rem;}
    .quad-emo{font-size:2.2rem;}
    .quad-desc{font-size:.72rem;}
  }
</style>
</head>
<body>

  <div class="brand">
    <img src="logo-medibox.png" alt="MediBox Antilles-Guyane">
    <span>MediBox <strong>Antilles-Guyane</strong></span>
  </div>

  <div class="hero">
    <h1>Rejoins MediBox</h1>
    <p>Choisis ton parcours pour t'inscrire.</p>
  </div>

  <div class="grid">

    <!-- 1 · Terminale Santé (à venir) -->
    <div class="quad q-terminale soon">
      <div class="quad-emo">🎒</div>
      <div class="quad-title">Terminale Santé</div>
      <div class="quad-desc">Lycéen·ne·s</div>
      <div class="quad-cta">Bientôt</div>
    </div>

    <!-- 2 · PASS-LAS (actif) -->
    <a class="quad q-passlas" href="/inscription-pass-las/">
      <div class="quad-emo">🧬</div>
      <div class="quad-title">PASS-LAS</div>
      <div class="quad-desc">1re année santé</div>
      <div class="quad-cta">S'inscrire →</div>
    </a>

    <!-- 3 · LAS2-3 (actif) -->
    <a class="quad q-las23" href="/inscription-las2-3/">
      <div class="quad-emo">📚</div>
      <div class="quad-title">LAS2-3</div>
      <div class="quad-desc">Licence Accès Santé 2-3</div>
      <div class="quad-cta">S'inscrire →</div>
    </a>

    <!-- 4 · P2-D4 (actif) -->
    <a class="quad q-p2d4" href="/preinscription-p2-d4/">
      <div class="quad-emo">🩺</div>
      <div class="quad-title">P2-D4</div>
      <div class="quad-desc">2e cycle · P2 à D4</div>
      <div class="quad-cta">S'inscrire →</div>
    </a>

  </div>

  <div class="foot">go.mediboxantillesguyane.com/inscriptions</div>

</body>
</html>
