<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plateforme 2026-2027 — bientôt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-card">
    <div class="card-header">
      <div class="logo-row">
        <img src="" class="logo-img small" id="logoImg" alt="">
        <div class="logo-text small"><span id="brandPart1"></span><span id="brandPart2"></span></div>
      </div>
      <h1 class="subtitle">Plateforme 2026-2027</h1>
      <span class="year" id="year"></span>
    </div>

    <div style="text-align:center;font-size:2.6rem;margin:10px 0 4px;">⏳</div>

    <p style="font-size:0.95rem;color:#01466e;background:#e0edf4;padding:16px 18px;border-radius:12px;margin:14px 0;text-align:center;line-height:1.55;">
      L'accès à la plateforme MediBox 2026-2027 n'est pas encore ouvert.
    </p>

    <p style="font-size:0.9rem;color:#334155;line-height:1.55;margin:14px 4px;text-align:center;">
      Tu recevras un email pour te prévenir des étapes de ton intégration. Merci de ta patience, à très bientôt !
    </p>
  </div>

  <div class="auth-footer" id="footer"></div>

  <script src="config.js"></script>
  <script>
    document.title = 'Plateforme 2026-2027 — ' + APP_CONFIG.brandName;
    document.getElementById('logoImg').src = APP_CONFIG.logoUrl;
    document.getElementById('logoImg').alt = APP_CONFIG.brandName;
    document.getElementById('brandPart1').textContent = APP_CONFIG.brandPart1;
    document.getElementById('brandPart2').textContent = APP_CONFIG.brandPart2;
    document.getElementById('year').textContent = APP_CONFIG.year;
    document.getElementById('footer').textContent = APP_CONFIG.copyright;
  </script>
</body>
</html>
