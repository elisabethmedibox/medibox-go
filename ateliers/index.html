<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Les ateliers · MediBox Antilles-Guyane</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--navy:#01466e;--navy-deep:#01233a;--gold:#e8a200;--coral:#e11d2b;--green:#15a06b;
        --bg:#f3f7fb;--txt:#0b2a3f;--txt-soft:#33536b;--txt-mute:#6c8499;--card-bd:#d3e0ec;--shadow:0 6px 20px rgba(1,52,86,.08);}
  body{font-family:'Chakra Petch',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;}
  .wrap{max-width:560px;margin:0 auto;padding:26px 20px 60px;}
  .brand{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.16em;font-size:.82rem;color:var(--navy);margin-bottom:22px;}
  .hero{text-align:center;margin-bottom:26px;}
  .eyebrow{display:inline-block;background:#fdf2d4;color:#92590a;font-weight:700;font-size:.82rem;
    letter-spacing:.06em;padding:6px 15px;border-radius:999px;margin-bottom:14px;text-transform:uppercase;}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.7rem;line-height:1.03;color:var(--navy-deep);margin-bottom:12px;}
  .sub{color:var(--txt-soft);font-size:1.06rem;line-height:1.5;}
  .progress{margin:20px auto 0;display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--card-bd);
    border-radius:999px;padding:9px 18px;font-weight:700;color:var(--navy);box-shadow:var(--shadow);}
  .progress .n{color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;}
  .grid{display:flex;flex-direction:column;gap:14px;margin-top:26px;}
  .card{display:flex;align-items:center;gap:16px;background:#fff;border:1.5px solid var(--card-bd);border-radius:18px;
    padding:18px;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:transform .15s,border-color .15s;}
  .card:hover{transform:translateY(-2px);border-color:var(--navy);}
  .card.done{border-color:var(--gold);}
  .emoji{flex:0 0 auto;width:58px;height:58px;border-radius:15px;background:#eef4fa;display:grid;place-items:center;font-size:2rem;}
  .card.done .emoji{background:#fdf2d4;}
  .info{flex:1;min-width:0;}
  .pub{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.03em;padding:3px 11px;border-radius:999px;margin-bottom:5px;}
  .pub.pub-public{background:#fde4e5;color:#a51420;}
  .pub.pub-lycee{background:#e0f0fb;color:#0a4f7a;}
  .info h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.5rem;color:var(--navy-deep);line-height:1;margin-bottom:6px;}
  .state{font-size:.85rem;font-weight:700;display:inline-flex;align-items:center;gap:6px;}
  .state.s-todo{color:var(--txt-mute);}
  .state.s-doing{color:#b06a00;}
  .state.s-done{color:var(--green);}
  .arrow{flex:0 0 auto;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.6rem;color:var(--navy);}
  .foot{margin-top:34px;text-align:center;font-size:.78rem;color:var(--txt-mute);}
  @media(max-width:380px){h1{font-size:2.2rem;}.emoji{width:50px;height:50px;font-size:1.7rem;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">🩺 MEDIBOX · ANTILLES-GUYANE</div>

  <div class="hero">
    <div class="eyebrow" id="event-date">Samedi 20 juin 2026</div>
    <h1 id="event-title">Les ateliers MediBox</h1>
    <p class="sub" id="event-sub">Choisis un atelier et apprends un geste qui compte. Découvre, pratique, et repars avec l'essentiel.</p>
    <div class="progress"><span class="n" id="done-count">0</span><span>/ <span id="total-count">5</span> ateliers validés</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot">go.mediboxantillesguyane.com · MediBox Antilles-Guyane</div>
</div>

<script src="config.js"></script>
<script>
(function(){
  "use strict";
  // Liste de secours (si la base ne répond pas). L'ordre d'affichage suit ce tableau.
  var FALLBACK = [
    { slug:"atelier_rcp_public",      emoji:"🫀", titre:"RCP",         public:"Grand public" },
    { slug:"atelier_heimlich_public", emoji:"🫁", titre:"Heimlich",    public:"Grand public" },
    { slug:"atelier_suture_lycee",    emoji:"🪡", titre:"Suture",      public:"Lycée" },
    { slug:"atelier_oto_lycee",       emoji:"👂", titre:"Otoscope",    public:"Lycée" },
    { slug:"atelier_stheto_lycee",    emoji:"🩺", titre:"Stéthoscope", public:"Lycée" }
  ];
  var ORDER = FALLBACK.map(function(a){ return a.slug; });

  function stateOf(slug){
    try { return localStorage.getItem("atelier_" + slug) || ""; } catch(e){ return ""; }
  }

  function render(list){
    // ordonne selon ORDER, puis les inconnus à la fin
    list.sort(function(a,b){
      var ia = ORDER.indexOf(a.slug), ib = ORDER.indexOf(b.slug);
      return (ia<0?99:ia) - (ib<0?99:ib);
    });
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var done = 0;
    list.forEach(function(a){
      var st = stateOf(a.slug);
      if(st === "valide") done++;
      var stateHtml = st === "valide"
        ? '<span class="state s-done">🥇 Validé</span>'
        : (st === "en_cours" ? '<span class="state s-doing">🟠 Commencé</span>'
                             : '<span class="state s-todo">▶ À découvrir</span>');
      var pubClass = (a.public && a.public.toLowerCase().indexOf("lyc") >= 0) ? "pub-lycee" : "pub-public";
      var card = document.createElement("a");
      card.className = "card" + (st === "valide" ? " done" : "");
      card.href = "../" + a.slug + "/";
      card.innerHTML =
        '<div class="emoji">' + (a.emoji || "🩺") + '</div>' +
        '<div class="info">' +
          '<span class="pub ' + pubClass + '">' + (a.public || "") + '</span>' +
          '<h2>' + (a.titre || "") + '</h2>' +
          stateHtml +
        '</div>' +
        '<div class="arrow">→</div>';
      grid.appendChild(card);
    });
    document.getElementById("done-count").textContent = done;
    document.getElementById("total-count").textContent = list.length;
  }

  // Source de vérité : la base. Repli sur la liste locale.
  var db = window.ATELIER_DB;
  if(db && window.fetch){
    fetch(db.url + "/rest/v1/ateliers_contenu?select=slug,titre:data->>titre,public:data->>public,emoji:data->>emoji", {
      headers:{ apikey: db.anonKey, Authorization: "Bearer " + db.anonKey }
    }).then(function(r){ return r.ok ? r.json() : null; })
      .then(function(rows){ render(rows && rows.length ? rows : FALLBACK.slice()); })
      .catch(function(){ render(FALLBACK.slice()); });
  } else {
    render(FALLBACK.slice());
  }
})();
</script>
</body>
</html>
